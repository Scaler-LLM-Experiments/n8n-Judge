<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Overlay components</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: #fff; }
  body { padding: 24px; font-family: var(--font-body); color: var(--fg-1); }
  .lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-4); margin-bottom: 12px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .note { font-size: 12px; color: var(--fg-3); margin-top: 18px; max-width: 600px; line-height: 1.55; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Modal, Drawer, Menu, Popover, Tooltip, Button, IconButton, Input } = window.SyntaxByScalerDesignSystem_6a7054;
  const Dots = <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>;
  const Info = <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>;
  function Demo() {
    const [modal, setModal] = React.useState(false);
    const [drawer, setDrawer] = React.useState(false);
    return (
      <div>
        <div className="lbl">Triggers</div>
        <div className="row">
          <Button variant="primary" onClick={() => setModal(true)}>Open modal</Button>
          <Button variant="outline" onClick={() => setDrawer(true)}>Open drawer</Button>
          <Menu trigger={<IconButton icon={Dots} variant="outline" aria-label="More" />} items={[
            { label: 'Edit', onClick: () => {} },
            { label: 'Duplicate', onClick: () => {} },
            { divider: true },
            { label: 'Delete', danger: true, onClick: () => {} },
          ]} />
          <Popover trigger={<Button variant="ghost">Filter</Button>}>
            <div style={{ fontFamily: 'var(--font-body)' }}>
              <div style={{ fontSize: 12, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--fg-4)', marginBottom: 10 }}>Sort by</div>
              <Input label="Keyword" placeholder="Search…" />
            </div>
          </Popover>
          <Tooltip content="Pass aria-label for icon-only actions"><span style={{ display: 'inline-flex', color: 'var(--fg-3)' }}>{Info}</span></Tooltip>
        </div>
        <p className="note">All five share one portal + dismiss foundation (backdrop click, Escape, outside-click). Modal and Drawer are controlled via <code>open</code> / <code>onClose</code>; Menu and Popover manage their own open state from a trigger.</p>
        <Modal open={modal} onClose={() => setModal(false)} title="Confirm enrolment"
          footer={<><Button variant="ghost" onClick={() => setModal(false)}>Cancel</Button><Button variant="primary" onClick={() => setModal(false)}>Confirm</Button></>}>
          You’re enrolling in the AI/ML cohort starting August 12. You can switch programs with your counsellor later.
        </Modal>
        <Drawer open={drawer} onClose={() => setDrawer(false)} title="Filters"
          footer={<Button variant="primary" onClick={() => setDrawer(false)}>Apply</Button>}>
          Drawer body content goes here.
        </Drawer>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
