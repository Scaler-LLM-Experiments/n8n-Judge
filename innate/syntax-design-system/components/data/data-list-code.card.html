<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>List & CodeBlock</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: #fff; }
  body { padding: 24px; font-family: var(--font-body); color: var(--fg-1); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; }
  .lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-4); margin-bottom: 12px; }
  .stack { display: flex; flex-direction: column; gap: 18px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { List, CodeBlock, Badge } = window.SyntaxByScalerDesignSystem_6a7054;
  const Chevron = <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="m9 18 6-6-6-6"/></svg>;
  const Dot = (c) => <span style={{ display:'inline-block', width:8, height:8, background:c }}></span>;
  function Demo() {
    return (
      <div className="grid">
        <div>
          <div className="lbl">List</div>
          <List items={[
            { id: 1, primary: 'Neural networks', secondary: 'Module 4 · 6 lessons', leading: Dot('#0055FF'), meta: '92%', trailing: Chevron, onClick: () => {} },
            { id: 2, primary: 'Transformers & attention', secondary: 'Module 5 · in progress', leading: Dot('#E8B017'), selected: true, trailing: Chevron },
            { id: 3, primary: 'Fine-tuning', secondary: 'Module 6 · locked', leading: Dot('#D1D1D1'), disabled: true },
          ]} />
        </div>
        <div>
          <div className="lbl">Code block</div>
          <div className="stack">
            <CodeBlock language="TypeScript" filename="auth.ts" highlightLines={[4]} code={`// Verify the JWT, return the user or null.
export async function getUser(req) {
  const token = req.headers.get("authorization");
  if (!token) return null;
  return db.user.findUnique({ id: 42 });
}`} />
            <CodeBlock theme="light" language="Bash" showLineNumbers={false} code={`npm install @scaler/sdk`} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
