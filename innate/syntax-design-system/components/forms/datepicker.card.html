<!-- @dsCard group="Components" name="Forms — Date picker" subtitle="Single date and start/end range calendars" viewport="640x400" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DatePicker</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: #fff; }
  body { padding: 24px; font-family: var(--font-body); color: var(--fg-1); }
  .row { display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap; }
  .lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-4); margin-bottom: 12px; }
  .val { margin-top: 10px; font-size: 12px; color: var(--fg-3); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { DatePicker } = window.SyntaxByScalerDesignSystem_6a7054;
  const fmt = (d) => d ? d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
  function Demo() {
    const [date, setDate] = React.useState(new Date());
    const [range, setRange] = React.useState({ start: null, end: null });
    return (
      <div className="row">
        <div>
          <div className="lbl">Single date</div>
          <DatePicker value={date} onChange={setDate} />
          <div className="val">Selected: {fmt(date)}</div>
        </div>
        <div>
          <div className="lbl">Range</div>
          <DatePicker mode="range" value={range} onChange={setRange} />
          <div className="val">{fmt(range.start)} → {fmt(range.end)}</div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
