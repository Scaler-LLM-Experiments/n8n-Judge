<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Combobox</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: #fff; }
  body { padding: 24px; font-family: var(--font-body); color: var(--fg-1); }
  .val { margin-top: 14px; font-size: 12px; color: var(--fg-3); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Combobox } = window.SyntaxByScalerDesignSystem_6a7054;
  function Demo() {
    const [program, setProgram] = React.useState('aiml');
    const opts = [
      { value: 'aiml', label: 'AI / Machine Learning' },
      { value: 'be', label: 'Backend Development' },
      { value: 'ds', label: 'Data Science' },
      { value: 'devops', label: 'DevOps & Cloud' },
      { value: 'sys', label: 'Systems Design' },
      { value: 'fe', label: 'Frontend Engineering' },
    ];
    const sel = opts.find((o) => o.value === program);
    return (
      <div style={{ maxWidth: 360 }}>
        <Combobox label="Program" value={program} onChange={setProgram} options={opts} hint="Type to filter the list." />
        <div className="val">Selected: {sel ? sel.label : '—'}</div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
