<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Navigation components</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: #fff; }
  body { padding: 24px; font-family: var(--font-body); color: var(--fg-1); }
  .group { margin-bottom: 28px; }
  .lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-4); margin-bottom: 12px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs, Breadcrumb, Stepper, Pagination } = window.SyntaxByScalerDesignSystem_6a7054;
  function Demo() {
    const [tab, setTab] = React.useState('overview');
    const [page, setPage] = React.useState(3);
    return (
      <div>
        <div className="group">
          <div className="lbl">Tabs</div>
          <Tabs value={tab} onChange={setTab} items={[
            { value: 'overview', label: 'Overview' },
            { value: 'curriculum', label: 'Curriculum', count: 12 },
            { value: 'mentors', label: 'Mentors' },
            { value: 'reviews', label: 'Reviews', count: 248 },
          ]} />
        </div>
        <div className="group">
          <div className="lbl">Breadcrumb</div>
          <Breadcrumb items={[
            { label: 'Home', href: '#' },
            { label: 'Programs', href: '#' },
            { label: 'AI/ML', href: '#' },
            { label: 'Module 4' },
          ]} />
        </div>
        <div className="group">
          <div className="lbl">Stepper</div>
          <Stepper current={1} steps={[
            { label: 'Your details' },
            { label: 'Choose program' },
            { label: 'Review' },
            { label: 'Submit' },
          ]} />
        </div>
        <div className="group">
          <div className="lbl">Pagination</div>
          <Pagination page={page} pageCount={12} onChange={setPage} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
