<!doctype html>
<!-- Scaler.com marketing site recreation. Intentionally NOT registered as a Design System card (removed from the DS presentation per request); still runnable directly. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Scaler — AI‑ready software engineering</title>
<meta name="viewport" content="width=1280" />
<link rel="icon" href="../../assets/logomark-colour.svg" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="kit.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Posters.jsx"></script>
  <script type="text/babel" src="WhyScaler.jsx"></script>
  <script type="text/babel" src="Programs.jsx"></script>
  <script type="text/babel" src="Mentor.jsx"></script>
  <script type="text/babel" src="Stats.jsx"></script>
  <script type="text/babel" src="ApplyCTA.jsx"></script>
  <script type="text/babel" src="ApplyModal.jsx"></script>

  <script type="text/babel">
    function App() {
      const [open, setOpen] = React.useState(false);
      const [program, setProgram] = React.useState('AI/ML');
      return (
        <div>
          <Nav onApply={() => setOpen(true)} />
          <Hero onApply={() => setOpen(true)} />
          <Posters />
          <div style={{ height: 96 }} />
          <WhyScaler />
          <Programs active={program} onSelect={setProgram} />
          <Stats />
          <Mentor />
          <ApplyCTA onApply={() => setOpen(true)} />
          <Footer />
          <ApplyModal open={open} onClose={() => setOpen(false)} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
