<!doctype html>
<!-- @dsCard group="Brand" name="Charts" subtitle="Line + sparkline, donut, stacked bar" viewport="720x540" --><html><head><meta charset="utf-8"><title>Charts</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .panel { border:1px solid #ECECEC; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .panel h4 {
    margin:0; font-family:var(--font-body); font-size:11px;
    letter-spacing:0.04em; text-transform:uppercase; color:#616161;
  }
  .panel .big {
    font-family:var(--font-headline); font-weight:500; font-size:28px;
    line-height:1; letter-spacing:-0.02em; color:#0C0C0C;
  }
  .panel .delta { font-family:var(--font-body); font-size:11px; color:#1F9D55; }
  .panel .delta.neg { color:#D62B2B; }
  .axis { font-family:var(--font-body); font-size:10px; fill:#AAAAAA; }
  .grid-line { stroke:#ECECEC; stroke-width:1; }
  .row { display:flex; align-items:center; gap:14px; }
  .legend { display:flex; gap:14px; font-family:var(--font-body); font-size:11px; color:#616161; }
  .legend .sw { display:inline-block; width:10px; height:10px; vertical-align:middle; margin-right:6px; }

  /* Bar segment colors */
  .b1 { fill:#0055FF; } .b2 { fill:#82B0FF; } .b3 { fill:#1F9D55; }
</style></head>
<body class="card">
<div class="grid">

  <!-- LINE + sparkline -->
  <div class="panel">
    <h4>Weekly active learners</h4>
    <div class="row" style="justify-content:space-between; align-items:flex-end">
      <div>
        <div class="big">12,480</div>
        <div class="delta">▲ 8.2% vs last week</div>
      </div>
      <svg width="88" height="32" viewBox="0 0 88 32">
        <polyline fill="none" stroke="#0055FF" stroke-width="1.5"
          points="0,24 11,20 22,22 33,16 44,18 55,12 66,14 77,8 88,6"/>
      </svg>
    </div>
    <svg width="100%" height="140" viewBox="0 0 320 140" preserveAspectRatio="none">
      <line x1="0"  y1="20"  x2="320" y2="20"  class="grid-line"/>
      <line x1="0"  y1="60"  x2="320" y2="60"  class="grid-line"/>
      <line x1="0"  y1="100" x2="320" y2="100" class="grid-line"/>
      <line x1="0"  y1="120" x2="320" y2="120" stroke="#D1D1D1"/>
      <!-- area -->
      <path d="M0,90 L40,75 L80,82 L120,55 L160,62 L200,40 L240,48 L280,28 L320,22 L320,120 L0,120 Z"
            fill="#0055FF" fill-opacity="0.10"/>
      <!-- line -->
      <polyline fill="none" stroke="#0055FF" stroke-width="2"
        points="0,90 40,75 80,82 120,55 160,62 200,40 240,48 280,28 320,22"/>
      <!-- markers -->
      <g fill="#0055FF">
        <circle cx="160" cy="62" r="3"/>
        <circle cx="320" cy="22" r="3"/>
      </g>
      <!-- highlight last point label -->
      <g font-family="Plus Jakarta Sans" font-size="10" fill="#0055FF">
        <text x="290" y="14" text-anchor="end" font-weight="600">12,480</text>
      </g>
      <!-- x labels -->
      <g class="axis"><text x="0" y="135">M</text><text x="40" y="135">T</text>
        <text x="80" y="135">W</text><text x="120" y="135">T</text>
        <text x="160" y="135">F</text><text x="200" y="135">S</text>
        <text x="240" y="135">S</text><text x="280" y="135">M</text>
        <text x="320" y="135" text-anchor="end">T</text></g>
    </svg>
  </div>

  <!-- DONUT -->
  <div class="panel">
    <h4>Learner status · cohort 18</h4>
    <div class="row">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="46" fill="none" stroke="#ECECEC" stroke-width="14"/>
        <!-- 3 segments around 289.03 circumference -->
        <circle cx="60" cy="60" r="46" fill="none" stroke="#0055FF"  stroke-width="14"
          stroke-dasharray="173.4 115.6" stroke-dashoffset="0"   transform="rotate(-90 60 60)"/>
        <circle cx="60" cy="60" r="46" fill="none" stroke="#82B0FF" stroke-width="14"
          stroke-dasharray="72.3 216.7"   stroke-dashoffset="-173.4" transform="rotate(-90 60 60)"/>
        <circle cx="60" cy="60" r="46" fill="none" stroke="#D1D1D1" stroke-width="14"
          stroke-dasharray="43.4 245.6"   stroke-dashoffset="-245.7" transform="rotate(-90 60 60)"/>
        <text x="60" y="58" text-anchor="middle"
          font-family="Plus Jakarta Sans" font-weight="600" font-size="18" fill="#0C0C0C">216</text>
        <text x="60" y="74" text-anchor="middle"
          font-family="Plus Jakarta Sans" font-size="9" fill="#616161" letter-spacing="0.08em">LEARNERS</text>
      </svg>
      <div style="flex:1">
        <div class="legend" style="flex-direction:column; gap:8px">
          <span><span class="sw" style="background:#0055FF"></span>On track · 60%</span>
          <span><span class="sw" style="background:#82B0FF"></span>In progress · 25%</span>
          <span><span class="sw" style="background:#D1D1D1"></span>Inactive · 15%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- BAR (stacked) -->
  <div class="panel" style="grid-column:1/-1">
    <h4>Lesson completions · last 6 weeks</h4>
    <svg width="100%" height="160" viewBox="0 0 640 160" preserveAspectRatio="none">
      <line x1="0" y1="40"  x2="640" y2="40"  class="grid-line"/>
      <line x1="0" y1="80"  x2="640" y2="80"  class="grid-line"/>
      <line x1="0" y1="120" x2="640" y2="120" class="grid-line"/>
      <line x1="0" y1="140" x2="640" y2="140" stroke="#D1D1D1"/>
      <!-- 6 stacked bars: completed (b1) + in-progress (b2) + late (b3 here = warning) -->
      <g>
        <!-- bar 1 -->
        <rect class="b1" x="40"  y="80"  width="44" height="60"/>
        <rect class="b2" x="40"  y="60"  width="44" height="20"/>
        <rect class="b3" x="40"  y="50"  width="44" height="10" fill="#C97A0E"/>
        <!-- bar 2 -->
        <rect class="b1" x="140" y="70"  width="44" height="70"/>
        <rect class="b2" x="140" y="48"  width="44" height="22"/>
        <rect          x="140" y="40"  width="44" height="8"  fill="#C97A0E"/>
        <!-- bar 3 -->
        <rect class="b1" x="240" y="56"  width="44" height="84"/>
        <rect class="b2" x="240" y="34"  width="44" height="22"/>
        <rect          x="240" y="28"  width="44" height="6"  fill="#C97A0E"/>
        <!-- bar 4 -->
        <rect class="b1" x="340" y="64"  width="44" height="76"/>
        <rect class="b2" x="340" y="42"  width="44" height="22"/>
        <rect          x="340" y="34"  width="44" height="8"  fill="#C97A0E"/>
        <!-- bar 5 -->
        <rect class="b1" x="440" y="38"  width="44" height="102"/>
        <rect class="b2" x="440" y="20"  width="44" height="18"/>
        <rect          x="440" y="14"  width="44" height="6"  fill="#C97A0E"/>
        <!-- bar 6 (current week, lighter outline) -->
        <rect class="b1" x="540" y="52"  width="44" height="88" opacity="0.55"/>
        <rect class="b2" x="540" y="30"  width="44" height="22" opacity="0.55"/>
        <rect          x="540" y="22"  width="44" height="8"  fill="#C97A0E" opacity="0.55"/>
        <rect x="540" y="14" width="44" height="126" fill="none" stroke="#0055FF" stroke-width="1" stroke-dasharray="2 2"/>
      </g>
      <g class="axis">
        <text x="62"  y="155" text-anchor="middle">W23</text>
        <text x="162" y="155" text-anchor="middle">W24</text>
        <text x="262" y="155" text-anchor="middle">W25</text>
        <text x="362" y="155" text-anchor="middle">W26</text>
        <text x="462" y="155" text-anchor="middle">W27</text>
        <text x="562" y="155" text-anchor="middle">W28 (now)</text>
      </g>
    </svg>
    <div class="legend" style="margin-top:4px">
      <span><span class="sw" style="background:#0055FF"></span>Completed</span>
      <span><span class="sw" style="background:#82B0FF"></span>In progress</span>
      <span><span class="sw" style="background:#C97A0E"></span>Late</span>
    </div>
  </div>

</div>
</body></html>
