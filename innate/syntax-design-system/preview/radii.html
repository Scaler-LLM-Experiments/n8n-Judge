  </div>

  </div>
  <div class="col" style="align-items:center; gap:10px">
    <div style="width:80px; height:80px; background:#fff; border:1px solid #CAC0C0; border-radius:0"></div>
    <div class="hex">0px · inputs</div>
  </div>
  <div class="col" style="align-items:center; gap:10px">
    <div style="width:80px; height:80px; background:#E8B017; border-radius:0"></div>
