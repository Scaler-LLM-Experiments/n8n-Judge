<!doctype html>
<!-- @dsCard group="Brand" name="Navbar — Top navigation" subtitle="Fixed 60px white nav, 1px bottom border" viewport="700x140" --><html><head><meta charset="utf-8"><title>Navbar</title>
<link rel="stylesheet" href="_card.css">
<!-- Material Symbols · Sharp · outlined · weight 400 · grade 0 · opsz 24.
     Square linecaps + mitered joins = on-brand (no rounded corners). -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
  body.card { padding:0; }
  .nav { height:60px; border-bottom:1px solid #E5E7EB; display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:#fff; }
  .nav .logo img { height:18px; }
  .nav ul { display:flex; gap:4px; list-style:none; margin:0; padding:0; }
  .nav ul li {
    padding:8px 14px; font-family:var(--font-body); font-size:14px; font-weight:500;
    color:#212121; display:flex; align-items:center; gap:6px; cursor:pointer;
    transition:color 120ms ease;
  }
  .nav ul li:hover { color:#0055FF; }
  .nav .cta { display:flex; gap:12px; align-items:center; }
  .icon {
    font-family:'Material Symbols Sharp'; font-weight:400;
    font-size:18px; line-height:1; color:currentColor;
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .icon-btn {
    width:36px; height:36px; display:inline-flex; align-items:center; justify-content:center;
    background:transparent; border:1px solid transparent; cursor:pointer; color:#212121;
    transition:background 120ms ease, box-shadow 120ms ease, color 120ms ease;
  }
  .icon-btn:hover { background:#EBF8FF; color:#0055FF; box-shadow:inset 0 0 0 1px #0055FF; }
  .btn--sm { height:36px; }
</style></head>
<body class="card">
<div class="nav">
  <div class="logo"><img src="../assets/logo-colour.svg" alt="Scaler"></div>
  <ul>
    <li>Programs <span class="icon" style="font-size:16px">expand_more</span></li>
    <li>Masterclass</li>
    <li>AI Labs</li>
    <li>Alumni</li>
    <li>Resources <span class="icon" style="font-size:16px">expand_more</span></li>
  </ul>
  <div class="cta">
    <button class="icon-btn" aria-label="Search"><span class="icon">search</span></button>
    <button class="icon-btn" aria-label="Notifications"><span class="icon">notifications</span></button>
    <button class="btn btn--outline btn--sm">Login</button>
    <button class="btn btn--primary btn--sm">Talk to an advisor</button>
  </div>
</div>
</body></html>
