<!doctype html>
<!-- @dsCard group="Brand" name="Tabs" subtitle="Underline tabs + segmented control" viewport="720x260" --><html><head><meta charset="utf-8"><title>Tabs</title>
<link rel="stylesheet" href="_card.css">
<style>
  .stack { display:flex; flex-direction:column; gap:24px; }
  .grp-title { font-family:var(--font-body); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#AAAAAA; margin-bottom:10px; }

  /* Underline tabs */
  .tabs-u { display:flex; gap:24px; border-bottom:1px solid #E4E4E4; }
  .tabs-u button {
    background:transparent; border:0; cursor:pointer;
    padding:12px 0; font-family:var(--font-body); font-size:14px; font-weight:500;
    color:#616161; position:relative; transition: color 120ms ease;
  }
  .tabs-u button:hover { color:#0055FF; }
  .tabs-u button.active { color:#0C0C0C; }
  .tabs-u button.active::after {
    content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px;
    background:#0055FF;
  }

  /* Segmented */
  .seg { display:inline-flex; border:1px solid #D1D1D1; }
  .seg button {
    background:#fff; border:0; cursor:pointer; padding:8px 16px;
    font-family:var(--font-body); font-size:13px; font-weight:500; color:#262626;
    border-right:1px solid #D1D1D1; transition: background 120ms ease, color 120ms ease;
  }
  .seg button:last-child { border-right:0; }
  .seg button:hover { background:#F5F5F5; }
  .seg button.active { background:#0055FF; color:#fff; }
</style></head>
<body class="card">
<div class="stack">
  <div>
    <div class="grp-title">Underline tabs</div>
    <div class="tabs-u">
      <button class="active">Overview</button>
      <button>Curriculum</button>
      <button>Mentors</button>
      <button>Reviews</button>
      <button>FAQ</button>
    </div>
  </div>
  <div>
    <div class="grp-title">Segmented control</div>
    <div class="seg">
      <button class="active">All</button>
      <button>In progress</button>
      <button>Completed</button>
    </div>
  </div>
</div>
</body></html>
