<!doctype html>
<!-- @dsCard group="Brand" name="Avatars" subtitle="Sizes, stack, presence dot" viewport="720x260" --><html><head><meta charset="utf-8"><title>Avatars</title>
<link rel="stylesheet" href="_card.css">
<style>
  .stack { display:flex; flex-direction:column; gap:18px; }
  .grp-title { font-family:var(--font-body); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#AAAAAA; margin-bottom:10px; }
  .row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .av {
    display:inline-flex; align-items:center; justify-content:center;
    background:#011845; color:#fff;
    font-family:var(--font-body); font-weight:600; letter-spacing:0.02em;
    border:1px solid rgba(0,0,0,0.06);
  }
  .av img { width:100%; height:100%; object-fit:cover; display:block; }
  .av.s24 { width:24px; height:24px; font-size:9px; }
  .av.s32 { width:32px; height:32px; font-size:11px; }
  .av.s40 { width:40px; height:40px; font-size:13px; }
  .av.s56 { width:56px; height:56px; font-size:18px; }
  .av.s80 { width:80px; height:80px; font-size:24px; }

  .av.b1 { background:#0055FF; }
  .av.b2 { background:#011845; }
  .av.b3 { background:#8000FF; }
  .av.b4 { background:#1F9D55; }

  /* Stack */
  .stack-av { display:inline-flex; }
  .stack-av .av { box-shadow: 0 0 0 2px #fff; margin-left:-10px; }
  .stack-av .av:first-child { margin-left:0; }
  .more {
    display:inline-flex; align-items:center; justify-content:center;
    width:32px; height:32px; background:#F5F5F5; color:#262626;
    font-family:var(--font-body); font-size:11px; font-weight:600;
    margin-left:-10px; box-shadow: 0 0 0 2px #fff;
  }

  /* Online dot */
  .av-wrap { position:relative; display:inline-block; }
  .pres { position:absolute; right:-2px; bottom:-2px; width:10px; height:10px; background:#1F9D55; box-shadow:0 0 0 2px #fff; }
</style></head>
<body class="card">
<div class="stack">
  <div>
    <div class="grp-title">Sizes · 24 / 32 / 40 / 56 / 80</div>
    <div class="row">
      <div class="av s24 b1">SA</div>
      <div class="av s32 b2">RP</div>
      <div class="av s40 b3">MK</div>
      <div class="av s56 b4">AN</div>
      <div class="av s80 b1"><img src="../assets/mentor-sample.png" alt=""></div>
    </div>
  </div>
  <div>
    <div class="grp-title">Stack · cohort row</div>
    <div class="row">
      <div class="stack-av">
        <div class="av s32 b1">SA</div>
        <div class="av s32 b2">RP</div>
        <div class="av s32 b3">MK</div>
        <div class="av s32 b4">AN</div>
        <div class="more">+12</div>
      </div>
      <div class="av-wrap">
        <div class="av s40 b2">JD</div>
        <span class="pres" title="online"></span>
      </div>
    </div>
  </div>
</div>
</body></html>
