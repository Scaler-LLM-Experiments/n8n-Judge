<!doctype html>
<!-- @dsCard group="LMS Patterns" name="Greeting + salutation" subtitle="Sticky welcome that collapses to a slim bar on scroll; salutation rotates per visit (time-of-day aware)" viewport="720x360" -->
<html><head><meta charset="utf-8"><title>Greeting</title>
<link rel="stylesheet" href="_card.css">
<style>
  body.card{ width:720px; }
  :root{ --ease:cubic-bezier(.25,1,.5,1); }
  .label{ font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#AAAAAA; margin:0 0 10px 2px; font-family:var(--font-body); }
  .demo{ display:flex; flex-direction:column; gap:26px; }
  .greeting{ display:flex; align-items:center; gap:18px; padding:18px 16px; background:#fff; border:1px solid var(--border-subtle); }
  .greeting__glyph{ width:50px; height:50px; flex:none; display:flex; align-items:center; justify-content:center; transition:width .3s var(--ease), height .3s var(--ease); }
  .greeting__glyph svg{ width:100%; height:100%; }
  .greeting__hi{ margin:0; font-size:15px; color:var(--fg-3); font-weight:500; line-height:1.3; font-family:var(--font-body); }
  .greeting__title{ margin:2px 0 0; font-family:var(--font-headline); font-size:28px; font-weight:500; letter-spacing:-.8px; line-height:1.05; color:var(--fg-1); }

  .greeting.is-slim{ padding:11px 16px; gap:14px; }
  .greeting.is-slim .greeting__glyph{ width:34px; height:34px; }
  .greeting.is-slim .greeting__hi{ font-size:12px; }
  .greeting.is-slim .greeting__title{ font-size:20px; }
  .rotate{ margin-left:auto; display:inline-flex; align-items:center; gap:7px; font-family:var(--font-body); font-size:12px; font-weight:600; color:var(--brand-primary); background:var(--brand-blue-50); border:1px solid rgba(0,85,255,.28); padding:7px 12px; cursor:pointer; }
  .cap{ font-size:11px; color:var(--fg-3); font-family:var(--font-body); margin-top:-16px; }
</style></head>
<body class="card">
<div class="demo">
  <div class="label">Full (at top of page)</div>
  <div class="greeting" id="full">
    <div class="greeting__glyph" id="glyph"></div>
    <div class="greeting__text">
      <p class="greeting__hi" id="hi">Welcome back,</p>
      <h1 class="greeting__title" id="title">Aarav</h1>
    </div>
    <button class="rotate" id="rot"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.4 2.6L3 8"/><path d="M3 3v5h5"/></svg>Rotate salutation</button>
  </div>

  <div class="label">Slim (collapsed once scrolled into the current module)</div>
  <div class="greeting is-slim">
    <div class="greeting__glyph" id="glyph2"></div>
    <div class="greeting__text">
      <p class="greeting__hi" id="hi2">Let's make today count,</p>
      <h1 class="greeting__title" id="title2">Aarav</h1>
    </div>
  </div>
  <div class="cap">Same phrase across both views; chosen once per visit. Collapse is driven by an IntersectionObserver sentinel.</div>
</div>
<script>
  var MARK = '<svg viewBox="0 0 83 83" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="30.8838" width="21.2326" height="83" fill="#0055ff"/><rect x="83" y="30.8837" width="21.2326" height="83" transform="rotate(90 83 30.8837)" fill="#0055ff"/><rect x="19.6621" y="78.3517" width="21.2326" height="83" transform="rotate(-135 19.6621 78.3517)" fill="#0055ff"/><rect x="4.64844" y="19.6619" width="21.2326" height="83" transform="rotate(-45 4.64844 19.6619)" fill="#0055ff"/><path d="M28.1709 38.5414C28.1709 33.4338 28.1709 30.8799 29.4975 29.1057C29.8794 28.595 30.3327 28.1418 30.8434 27.7599C32.6176 26.4332 35.1714 26.4332 40.2791 26.4332H42.7108C47.8185 26.4332 50.3723 26.4332 52.1465 27.7599C52.6573 28.1418 53.1105 28.595 53.4924 29.1057C54.819 30.8799 54.819 33.4338 54.819 38.5414V39.7573C54.819 44.7331 54.819 47.2211 53.7509 49.0751C53.0474 50.2961 52.0338 51.3097 50.8127 52.0132C48.9587 53.0814 46.4708 53.0814 41.495 53.0814C36.5191 53.0814 34.0312 53.0814 32.1772 52.0132C30.9561 51.3097 29.9426 50.2961 29.2391 49.0751C28.1709 47.2211 28.1709 44.7331 28.1709 39.7573V38.5414Z" fill="#fff"/><circle cx="41.4944" cy="39.7573" r="7.99444" fill="#121212"/><circle cx="44.799" cy="38.3169" r="1.77654" fill="#fff"/></svg>';
  document.getElementById('glyph').innerHTML = MARK;
  document.getElementById('glyph2').innerHTML = MARK;
  var PROMPTS = [
    {top:"Welcome back,", bottom:"Aarav"},
    {top:"Good morning,", bottom:"Aarav"},
    {top:"Aarav,", bottom:"let's ship it"},
    {top:"Push to main,", bottom:"Aarav"},
    {top:"Momentum starts now,", bottom:"Aarav"},
    {top:"Ready, Aarav?", bottom:"Let's dive in"},
  ];
  var i=0;
  document.getElementById('rot').addEventListener('click', function(){
    i=(i+1)%PROMPTS.length;
    document.getElementById('hi').textContent=PROMPTS[i].top;
    document.getElementById('title').textContent=PROMPTS[i].bottom;
  });
</script>
</body></html>
