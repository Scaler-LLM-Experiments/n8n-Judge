<!doctype html>
<!-- @dsCard group="Brand" name="Shadows — Minimal elevation" subtitle="Hairline xs, soft sm/md/lg in cool navy" viewport="700x240" --><html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_card.css"></head>
<body class="card">
<div class="meta" style="margin-bottom:16px">Elevation is minimal. Prefer hairline borders to shadow.</div>
<div class="row" style="gap:24px; justify-content:space-between">
  <div class="col" style="align-items:center; gap:10px">
    <div style="width:110px; height:72px; background:#fff; border:1px solid #E4E4E4"></div>
    <div class="hex">flat · 1px #E4E4E4</div>
  </div>
  <div class="col" style="align-items:center; gap:10px">
    <div style="width:110px; height:72px; background:#fff; box-shadow:0 1px 2px 0 rgba(26,26,26,0.05)"></div>
    <div class="hex">shadow-xs · button</div>
  </div>
  <div class="col" style="align-items:center; gap:10px">
    <div style="width:110px; height:72px; background:#fff; box-shadow:0 1px 2px 0 rgba(0,11,31,0.06), 0 1px 1px 0 rgba(0,11,31,0.04)"></div>
    <div class="hex">shadow-sm · card hover</div>
  </div>
  <div class="col" style="align-items:center; gap:10px">
    <div style="width:110px; height:72px; background:#fff; box-shadow:0 8px 24px -8px rgba(1,24,69,.10), 0 2px 6px -2px rgba(1,24,69,.06)"></div>
    <div class="hex">shadow-md · floating</div>
  </div>
</div>
</body></html>
