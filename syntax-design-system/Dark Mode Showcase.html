<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dark Mode Showcase — Syntax by Scaler</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--surface-0); color: var(--fg-1); font-family: var(--font-body); padding: 40px; }
  .wrap { max-width: 1080px; margin: 0 auto; }
  h1 { font-family: var(--font-headline); font-weight: 560; font-size: 30px; letter-spacing: -0.01em; margin: 0 0 4px; }
  .sub { color: var(--fg-3); font-size: 14px; margin: 0 0 36px; }
  section { margin-bottom: 34px; }
  .lbl { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-4); margin: 0 0 12px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 8px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .panel { border: 1px solid var(--border-subtle); background: var(--surface-1); padding: 16px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds_bundle.js"></script>
</head>
<body>
<div class="wrap"><div id="root"></div></div>
<script type="text/babel">
  const S = window.SyntaxByScalerDesignSystem_6a7054;
  const { Button, IconButton, SplitButton, Badge, Tag, Avatar, Card, Stat, Input, Combobox, Select, Checkbox, Switch, RadioGroup, Slider, Textarea, Tabs, Breadcrumb, Pagination, Stepper, Alert, Toast, Progress, Skeleton, Spinner, EmptyState, Table, List, DatePicker, LineChart, DonutChart, CodeBlock, Menu, StatTile } = S;
  const Bell = <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>;
  const Dots = <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>;
  const splitItems = [{ label: 'Save & duplicate' }, { label: 'Save as template' }, { divider: true }, { label: 'Discard', danger: true }];

  function App() {
    const [tab, setTab] = React.useState('overview');
    const [sel, setSel] = React.useState([2]);
    const [exp, setExp] = React.useState('mid');
    const [combo, setCombo] = React.useState('aiml');
    const cols = [
      { key: 'name', header: 'Learner', sortable: true, render: (r) => <span style={{ fontWeight: 600, color: 'var(--fg-1)' }}>{r.name}</span> },
      { key: 'program', header: 'Program', sortable: true },
      { key: 'status', header: 'Status', render: (r) => <Badge tone={r.t}>{r.status}</Badge> },
    ];
    const rows = [
      { id: 1, name: 'Priya Nair', program: 'AI/ML', status: 'Active', t: 'success' },
      { id: 2, name: 'Mohit Kumar', program: 'Backend', status: 'Live', t: 'info' },
      { id: 3, name: 'Anjali Rao', program: 'Systems', status: 'Paused', t: 'warning' },
    ];
    return (
      <div>
        <h1>Dark mode</h1>
        <p class="sub">Every component rendered under <code>data-theme="dark"</code>. Verifying surfaces, tints, hovers, chips, tracks and inversions adapt.</p>

        <section>
          <p class="lbl">Buttons · IconButton · SplitButton</p>
          <div className="row">
            <Button variant="primary">Primary</Button>
            <Button variant="black">Black</Button>
            <Button variant="outline">Outline</Button>
            <Button variant="ghost">Ghost</Button>
            <Button variant="link">Link</Button>
            <IconButton icon={Bell} variant="primary" aria-label="x" />
            <IconButton icon={Bell} variant="black" aria-label="x" />
            <IconButton icon={Bell} variant="outline" aria-label="x" />
            <SplitButton variant="primary" items={splitItems}>Save</SplitButton>
            <SplitButton variant="black" items={splitItems}>Publish</SplitButton>
            <SplitButton variant="outline" items={splitItems}>Export</SplitButton>
          </div>
        </section>

        <section>
          <p class="lbl">Badges · Tags · Avatar · Stat</p>
          <div className="row">
            <Badge tone="success">Enrolled</Badge>
            <Badge tone="warning">Closing</Badge>
            <Badge tone="info">Live</Badge>
            <Badge tone="danger">Full</Badge>
            <Badge>Neutral</Badge>
            <Tag selected>AI/ML</Tag>
            <Tag>Backend</Tag>
            <Tag onRemove={() => {}}>Removable</Tag>
            <Avatar name="Priya Nair" presence="online" />
            <Stat value="13×" label="Salary jumps" size={40} />
          </div>
        </section>

        <section>
          <p class="lbl">Form controls</p>
          <div className="cols">
            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
              <Input label="Work email" defaultValue="you@company.com" hint="We’ll send your link here." />
              <Combobox label="Program" value={combo} onChange={setCombo} options={[{value:'aiml',label:'AI / Machine Learning'},{value:'be',label:'Backend'},{value:'ds',label:'Data Science'}]} />
              <Slider value={3} min={1} max={5} showValue onChange={()=>{}} />
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
              <RadioGroup label="Experience" value={exp} onChange={setExp} options={[{value:'jr',label:'0–2 years'},{value:'mid',label:'3–5 years'},{value:'sr',label:'6+ years'}]} />
              <div className="row"><Checkbox checked onChange={()=>{}} label="Updates" /><Switch checked onChange={()=>{}} label="Dark mode" /><Switch checked={false} onChange={()=>{}} label="Off" /></div>
            </div>
          </div>
        </section>

        <section>
          <p class="lbl">Navigation</p>
          <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
            <Tabs value={tab} onChange={setTab} items={[{value:'overview',label:'Overview'},{value:'curriculum',label:'Curriculum',count:12},{value:'reviews',label:'Reviews',count:248}]} />
            <Breadcrumb items={[{label:'Home',href:'#'},{label:'Programs',href:'#'},{label:'AI/ML'}]} />
            <Stepper current={1} steps={[{label:'Details'},{label:'Program'},{label:'Review'}]} />
            <Pagination page={3} pageCount={9} onChange={()=>{}} />
          </div>
        </section>

        <section>
          <p class="lbl">Data · Charts</p>
          <div className="cols">
            <Table columns={cols} data={rows} rowKey="id" selectable selected={sel} onSelectChange={setSel} />
            <List items={[{id:1,primary:'Neural networks',secondary:'Module 4',meta:'92%'},{id:2,primary:'Transformers',secondary:'In progress',selected:true},{id:3,primary:'Fine-tuning',secondary:'Locked',disabled:true}]} />
          </div>
          <div className="cols" style={{ marginTop: 24 }}>
            <div className="panel"><LineChart data={[{label:'M',value:90},{label:'T',value:76},{label:'W',value:120},{label:'T',value:104},{label:'F',value:160}]} /></div>
            <div className="panel"><DonutChart centerValue="216" centerLabel="Learners" segments={[{label:'On track',value:60},{label:'In progress',value:25},{label:'Inactive',value:15,color:'#5A6884'}]} /></div>
          </div>
        </section>

        <section>
          <p class="lbl">Feedback</p>
          <div style={{ display:'flex', flexDirection:'column', gap:12, maxWidth:560 }}>
            <Alert tone="success" title="Application received" onClose={()=>{}}>We’ll be in touch within a day.</Alert>
            <Alert tone="info">Your next live session starts at 7:00 PM.</Alert>
            <Toast tone="danger" title="Upload failed" description="The file exceeded 25 MB." onClose={()=>{}} />
            <Progress label="Course completion" value={68} showValue />
            <div className="row"><Spinner /><div style={{flex:1}}><Skeleton variant="text" width="80%" /><div style={{height:8}} /><Skeleton variant="text" width="55%" /></div></div>
          </div>
        </section>

        <section>
          <p class="lbl">Surfaces · Calendar · Code · Menu</p>
          <div className="cols">
            <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
              <div className="row" style={{ gap:16 }}>
                <StatTile label="Completion" value="68%" sub="of 12" delta="3 this week" deltaDir="up" style={{ flex:1 }} />
                <StatTile label="Streak" value="24" sub="best" style={{ flex:1 }} />
              </div>
              <Card><div style={{ fontFamily:'var(--font-headline)', fontSize:18, marginBottom:6 }}>Hairline card</div><p style={{ margin:0, fontSize:13, color:'var(--fg-3)' }}>1px border, no shadow, zero radius.</p></Card>
              <div className="row"><Menu trigger={<IconButton icon={Dots} variant="outline" aria-label="More" />} items={[{label:'Edit'},{label:'Duplicate'},{divider:true},{label:'Delete',danger:true}]} /><span style={{ fontSize:12, color:'var(--fg-4)' }}>← open the menu</span></div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
              <DatePicker mode="range" defaultValue={{ start: new Date(2026,5,10), end: new Date(2026,5,18) }} />
            </div>
          </div>
          <div style={{ marginTop: 16 }}>
            <CodeBlock language="TypeScript" filename="auth.ts" highlightLines={[2]} code={`export async function getUser(req) {\n  if (!req.token) return null;\n  return db.user.findUnique({ id: 42 });\n}`} />
          </div>
        </section>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
