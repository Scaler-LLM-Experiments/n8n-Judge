<!doctype html>
<!-- @dsCard group="UI Kit — LMS" name="UI Kit — Learner platform" subtitle="Calm-scroll learner dashboard — collapsing greeting, module accordion, Daily Plan timeline with live Now marker, streak rail, full motion system" viewport="1280x900" -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Scaler AI LMS — Learner platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@400,500,600&display=swap" rel="stylesheet" />
  <link rel="icon" href="../../assets/mascot-mark.svg" />
  <link rel="stylesheet" href="lms.css" />
</head>
<body>
  <!-- ============================== TOP BAR ============================== -->
  <header class="topbar">
    <div class="topbar__left">
      <a class="logo" href="#">
        SCALER
        <svg class="logo__mark" width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M4 7l8-4 8 4-8 4-8-4z" fill="#0055ff"/>
          <path d="M4 12l8 4 8-4" stroke="#0055ff" stroke-width="2" fill="none" stroke-linejoin="round"/>
          <path d="M4 17l8 4 8-4" stroke="#0055ff" stroke-width="2" fill="none" stroke-linejoin="round"/>
        </svg>
      </a>
      <a class="switch-view" href="classic-dashboard.html" title="Classic dashboard + code editor">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/>
        </svg>
        Switch to old view
      </a>
    </div>

    <div class="search">
      <svg class="search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input type="text" placeholder="Search content, community, mentors…" />
      <span class="search__kbd">⌘K</span>
    </div>

    <div class="topbar__right">
      <button class="icon-btn" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>
        </svg>
      </button>
      <div class="user">
        <img src="https://i.pravatar.cc/64?img=12" alt="Kishan" />
        <span>Kishan</span>
      </div>
      <button class="companion-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0055ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/><circle cx="12" cy="12" r="4"/>
        </svg>
        Companion
      </button>
    </div>
  </header>

  <div class="body">
    <!-- ============================== LEFT NAV ============================== -->
    <nav class="leftnav">
      <button class="leftnav__item" aria-label="Toggle sidebar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
      </button>
      <button class="leftnav__item is-active" aria-label="Learning">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><path d="M6 8v8"/><path d="M18 6h-5a3 3 0 0 0-3 3v9"/><path d="m15 9-3-3 3-3"/></svg>
      </button>
      <button class="leftnav__item" aria-label="Tasks">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 12H3"/><path d="M16 6H3"/><path d="M16 18H3"/><path d="m17 9 3 3-3 3"/></svg>
      </button>
      <button class="leftnav__item" aria-label="Chat">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22z"/></svg>
      </button>
      <button class="leftnav__item" aria-label="Mentorship">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </button>
      <button class="leftnav__item" aria-label="Calendar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 2v4"/><path d="M16 2v4"/></svg>
      </button>
      <button class="leftnav__item" aria-label="Profile card">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/></svg>
      </button>
      <button class="leftnav__item" aria-label="Announcements">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
      </button>
      <button class="leftnav__item" aria-label="Community">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </button>
      <button class="leftnav__item" aria-label="Learning path">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      </button>
      <button class="leftnav__item" aria-label="Rewards">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="13" x="3" y="8" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8s1-5 4.5-5a2.5 2.5 0 0 1 0 5"/></svg>
      </button>
      <button class="leftnav__item" aria-label="Support">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11a9 9 0 0 1 18 0v5a3 3 0 0 1-3 3h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/><path d="M3 16v-5a9 9 0 0 1 .5-3"/><path d="M3 16a3 3 0 0 0 3 3h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3"/></svg>
      </button>
    </nav>

    <!-- ============================== MAIN ============================== -->
    <main class="main">
      <div class="content">
        <!-- ===================== VIEW: All Modules ===================== -->
        <div class="view is-active" id="view-modules" data-view="modules">
          <section class="past-zone" id="pastZone">
            <div class="modules" id="pastModules"><!-- generated by lms.js --></div>
          </section>

          <div class="rewind-divider" data-rewind aria-hidden="true"></div>

          <div class="greeting" id="greeting">
            <div class="greeting__glyph">
              <div class="greeting__mascot" id="mascotMount">
                <svg viewBox="0 0 83 83" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <rect x="30.8838" width="21.2326" height="83" fill="#0055ff"/>
                  <rect x="83" y="30.8837" width="21.2326" height="83" transform="rotate(90 83 30.8837)" fill="#0055ff"/>
                  <rect x="19.6621" y="78.3517" width="21.2326" height="83" transform="rotate(-135 19.6621 78.3517)" fill="#0055ff"/>
                  <rect x="4.64844" y="19.6619" width="21.2326" height="83" transform="rotate(-45 4.64844 19.6619)" fill="#0055ff"/>
                  <path d="M28.1709 38.5414C28.1709 33.4338 28.1709 30.8799 29.4975 29.1057C29.8794 28.595 30.3327 28.1418 30.8434 27.7599C32.6176 26.4332 35.1714 26.4332 40.2791 26.4332H42.7108C47.8185 26.4332 50.3723 26.4332 52.1465 27.7599C52.6573 28.1418 53.1105 28.595 53.4924 29.1057C54.819 30.8799 54.819 33.4338 54.819 38.5414V39.7573C54.819 44.7331 54.819 47.2211 53.7509 49.0751C53.0474 50.2961 52.0338 51.3097 50.8127 52.0132C48.9587 53.0814 46.4708 53.0814 41.495 53.0814C36.5191 53.0814 34.0312 53.0814 32.1772 52.0132C30.9561 51.3097 29.9426 50.2961 29.2391 49.0751C28.1709 47.2211 28.1709 44.7331 28.1709 39.7573V38.5414Z" fill="#fff"/>
                  <circle cx="41.4944" cy="39.7573" r="7.99444" fill="#121212"/>
                  <circle cx="44.799" cy="38.3169" r="1.77654" fill="#fff"/>
                </svg>
              </div>
            </div>
            <div class="greeting__text">
              <p class="greeting__hi">Welcome back,</p>
              <h1 class="greeting__title">Aarav</h1>
            </div>
          </div>

          <div class="modules" id="modules"><!-- generated by lms.js --></div>
        </div>

        <!-- ===================== VIEW: Daily Plan ===================== -->
        <div class="view" id="view-daily" data-view="daily">
          <section class="past-zone" id="dailyPast"><!-- generated by lms.js --></section>

          <div class="rewind-divider" data-rewind aria-hidden="true"></div>

          <div class="greeting" id="greetingDaily">
            <div class="greeting__glyph">
              <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
                <g fill="#0055ff">
                  <path d="M24 2c1.6 5.5 4.5 8.4 10 10-5.5 1.6-8.4 4.5-10 10-1.6-5.5-4.5-8.4-10-10 5.5-1.6 8.4-4.5 10-10z" opacity=".95"/>
                  <path d="M24 26c1.6 5.5 4.5 8.4 10 10-5.5 1.6-8.4 4.5-10 10-1.6-5.5-4.5-8.4-10-10 5.5-1.6 8.4-4.5 10-10z" opacity=".7"/>
                  <path d="M2 24c5.5-1.6 8.4-4.5 10-10 1.6 5.5 4.5 8.4 10 10-5.5 1.6-8.4 4.5-10 10-1.6-5.5-4.5-8.4-10-10z" opacity=".85"/>
                  <path d="M26 24c5.5-1.6 8.4-4.5 10-10 1.6 5.5 4.5 8.4 10 10-5.5 1.6-8.4 4.5-10 10-1.6-5.5-4.5-8.4-10-10z" opacity=".85"/>
                </g>
                <circle cx="24" cy="24" r="4.5" fill="#fff"/><circle cx="24" cy="24" r="2.3" fill="#121212"/>
              </svg>
            </div>
            <div class="greeting__text">
              <p class="greeting__hi">Welcome back,</p>
              <h1 class="greeting__title">Aarav</h1>
            </div>
          </div>

          <div class="daily" id="daily"><!-- generated by lms.js --></div>
        </div>
      </div>

      <!-- ===== Right rail stats card ===== -->
      <aside class="rail">
        <div class="stats-card">
          <div class="stats-card__top">
            <div class="stat">
              <span class="stat__label">RANK</span>
              <span class="stat__value">#12</span>
              <span class="stat__sub">of 150</span>
            </div>
            <div class="stat">
              <span class="stat__label">ATTN.</span>
              <span class="stat__value">98%</span>
              <span class="stat__sub">120 <span class="badge badge--yellow"><svg width="9" height="9" viewBox="0 0 24 24" fill="#fff"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg></span></span>
            </div>
            <div class="stat">
              <span class="stat__label">PSP</span>
              <span class="stat__value">98%</span>
              <span class="stat__sub">120 <span class="badge badge--orange"><svg width="9" height="9" viewBox="0 0 24 24" fill="#fff"><path d="M12 2c1 3-1 5-2 6 2 0 3 2 3 4 2-1 3-3 3-5 2 2 3 4 3 7a7 7 0 1 1-14 0c0-4 3-7 4-9 1 1 2 2 2 3 0-2 0-4-2-6z"/></svg></span></span>
            </div>
          </div>
          <div class="stats-card__week">
            <div class="week-day" data-day="M"><span class="week-day__lbl">M</span><span class="dot dot--lightning"></span><span class="dot dot--flame"></span></div>
            <div class="week-day" data-day="T"><span class="week-day__lbl">T</span><span class="dot dot--muted"></span><span class="dot dot--ring-muted"></span></div>
            <div class="week-day is-today" data-day="W"><span class="week-day__lbl">W</span><span class="dot dot--ring"></span><span class="dot dot--ring"></span></div>
            <div class="week-day" data-day="T"><span class="week-day__lbl">T</span><span class="dot dot--muted"></span><span class="dot dot--ring-muted"></span></div>
            <div class="week-day" data-day="F"><span class="week-day__lbl">F</span><span class="dot dot--faint-light"></span><span class="dot dot--ring-muted"></span></div>
            <div class="week-day" data-day="S"><span class="week-day__lbl">S</span><span class="dot dot--muted"></span><span class="dot dot--ring-muted"></span></div>
            <div class="week-day" data-day="S"><span class="week-day__lbl">S</span><span class="dot dot--muted"></span><span class="dot dot--ring-muted"></span></div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <!-- ===== Bottom floating pill ===== -->
  <div class="floating-tabs">
    <button class="ftab" data-view="daily">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 2v4"/><path d="M16 2v4"/></svg>
      Daily Plan
    </button>
    <span class="ftab-sep"></span>
    <button class="ftab is-active" data-view="modules">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V8l7-5 7 5v13"/><path d="M9 21v-6h6v6"/></svg>
      All Modules
    </button>
  </div>

  <!-- Go to today / now -->
  <button class="go-today" id="goToday" aria-label="Go to today">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 2v4"/><path d="M16 2v4"/><circle cx="12" cy="15" r="2.2"/></svg>
    <span>Go to today</span>
  </button>

  <!-- transient hint: there's older content above -->
  <div class="scroll-hint" id="scrollHint" aria-hidden="true">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    Scroll up for earlier classes
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="lms.js"></script>
</body>
</html>
